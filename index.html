<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/img/logo-change.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Change Skills Idiomas | A ponte definitiva entre você e o mundo</title>
    <meta name="description" content="Aprenda Inglês, Espanhol, Francês e Português para estrangeiros com metodologia comunicativa e prática na Change Skills. Aulas de conversação online e presenciais." />
    
    <!-- Premium Google Fonts prefetching -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
      /* Hide standard Google Translate widget completely in CSS globally */
      body {
        top: 0 !important;
      }
      .goog-te-banner-frame, 
      .goog-te-banner-frame.skiptranslate, 
      .goog-te-balloon-frame,
      iframe.goog-te-banner-frame,
      #goog-gt-tt, 
      .goog-te-spinner-pos {
        display: none !important;
        visibility: hidden !important;
      }
      font {
        background-color: transparent !important;
        box-shadow: none !important;
      }
    </style>
  </head>
  <body style="background: white;">
    <div id="app"></div>
    
    <!-- Background Google Translate container placed safely off-screen to allow proper initialization -->
    <div id="google_translate_element" style="position: absolute; top: -9999px; left: -9999px; width: 1px; height: 1px; overflow: hidden; opacity: 0;"></div>
    
    <script>
      // 1. Google Translate initialization callback
      window.googleTranslateElementInit = function() {
        new google.translate.TranslateElement({
          pageLanguage: 'pt',
          includedLanguages: 'pt,en,es,fr',
          layout: google.translate.TranslateElement.InlineLayout.SIMPLE,
          autoDisplay: false
        }, 'google_translate_element');
        
        // Let the application apply the stored language choice upon load
        window.dispatchEvent(new CustomEvent('google-translate-ready'));
      };
    </script>
    <!-- 2. Dynamic loader for Google Translate client library -->
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" defer></script>
    
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
